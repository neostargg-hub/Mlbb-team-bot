<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>MLBB Team Finder</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <div class="header-top">
                <h1>🎮 MLBB Team</h1>
                <div id="user-info" class="user-info"></div>
            </div>
            <div id="news-banner" class="news-banner">
                <div class="news-content"></div>
            </div>
        </header>
        
        <nav>
            <button class="tab-btn active" data-tab="feed">
                <span class="icon">📋</span>
                <span class="label">Лента</span>
            </button>
            <button class="tab-btn" data-tab="profile">
                <span class="icon">👤</span>
                <span class="label">Профиль</span>
            </button>
            <button class="tab-btn" data-tab="newpost">
                <span class="icon">✏️</span>
                <span class="label">Новый пост</span>
            </button>
        </nav>
        
        <main id="content" class="content">
            <!-- Контент подгружается через JS -->
        </main>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
